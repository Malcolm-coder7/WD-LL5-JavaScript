<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Water!!!</title>
<!-- Google Fonts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap">
<style>
/* --- General Styles --- */
body {
    font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #e0f7fa 60%, #b3e5fc 100%);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* --- Screen Styles --- */
.screen {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
    text-align: center;
    margin-top: 40px;
    min-width: 340px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(.68,-0.55,.27,1.55);
}
.screen[style*="block"] {
    opacity: 1;
    pointer-events: auto;
}

/* --- Buttons --- */
button {
    display: block;
    width: 200px;
    margin: 16px auto;
    padding: 14px 0;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #4fc3f7 60%, #0288d1 100%);
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    box-shadow: 0 2px 8px #b3e5fc33;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
}
button:hover {
    background: linear-gradient(90deg, #0288d1 60%, #4fc3f7 100%);
    transform: scale(1.04);
    box-shadow: 0 4px 16px #4fc3f766;
}

/* --- Puzzle Board --- */
#puzzle-board {
    width: 100vw;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
}
#game-wrapper {
    width: 600px;
    height: 600px;
    max-width: 98vw;
    max-height: 98vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}
#board-container {
    width: 100%;
    height: 100%;
    position: absolute;
    z-index: 1;
}
.match3-board {
    border-collapse: collapse;
    width: 100%;
    height: 100%;
    table-layout: fixed;
    border-radius: 16px;
    overflow: hidden;
    background: #e3f2fd;
}
.match3-board td {
    width: 20%;
    height: 20%;
    text-align: center;
    font-size: 3rem;
    border: 2px solid #90caf9;
    background: #fff;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s, background 0.2s;
}

/* --- Overlay --- */
#game-overlay {
    pointer-events: none;
    background: transparent !important;
    position: absolute;
    z-index: 2;
    width: 100% !important;
    height: 100% !important;
    border-radius: 18px;
}

/* --- Water Tile Animations --- */
.water-interactive {
    cursor: pointer;
    transition: box-shadow 0.15s, background 0.2s;
}
.water-interactive:hover {
    background: #b3e5fc;
    box-shadow: 0 0 12px #4fc3f7;
}
.water-interactive.splash {
    animation: water-splash 0.08s cubic-bezier(.68,-0.55,.27,1.55);
}
@keyframes water-splash {
    0% { transform: scale(1); }
    100% { transform: scale(1.18) translateY(-4px); }
}
.water-interactive.disappearing {
    pointer-events: none !important;
    animation: water-disappear 0.4s cubic-bezier(.68,-0.55,.27,1.55) forwards;
}
@keyframes water-disappear {
    0% { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.4) translateY(-18px); }
}

/* --- Win & Milestone Messages --- */
#win-message, #milestone-message {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    z-index: 2000;
    border-radius: 24px;
    padding: 40px 60px;
    text-align: center;
    animation: pop-in 0.7s cubic-bezier(.68,-0.55,.27,1.55);
}
#win-message { background: linear-gradient(135deg, #4fc3f7 60%, #0288d1 100%); color: #fff; border: 4px solid #fff; font-size: 3rem; }
#milestone-message { background: #0288d1; color: #fff; border: 2px solid #4fc3f7; font-size: 1.5rem; top: 25%; }
@keyframes pop-in {
    0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
    70% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
</style>
</head>
<body>

<!-- --- Screens --- -->
<div id="main-menu" class="screen">
    <h1>Save the Water!!!</h1>
    <button id="btn-new-game">New Game</button>
    <button id="btn-continue">Continue</button>
    <button id="btn-settings">Settings</button>
</div>

<div id="difficulty-select" class="screen" style="display:none">
    <h2>Select Difficulty</h2>
    <button class="difficulty-btn" data-difficulty="easy">Easy</button>
    <button class="difficulty-btn" data-difficulty="normal">Normal</button>
    <button class="difficulty-btn" data-difficulty="hard">Hard</button>
    <button id="btn-back-menu-difficulty">Back to Menu</button>
</div>

<div id="level-select" class="screen" style="display:none">
    <h2>Select Level</h2>
    <div id="level-buttons">
        <button class="level-btn" data-level="1">Village A</button>
        <button class="level-btn" data-level="2" disabled>Town B</button>
        <button class="level-btn" data-level="3" disabled>City C</button>
        <button class="level-btn" data-level="4" disabled>Hamlet D</button>
    </div>
    <button class="btn-back-menu">Back to Menu</button>
</div>

<div id="puzzle-board" class="screen" style="display:none">
    <h2>Puzzle Board</h2>
    <div id="score-bar">
        <span>Moves Left: <span id="moves-left">20</span></span>
        <span>Score: <span id="score">0</span></span>
        <span id="goal">Collect 10 water drops</span>
    </div>
    <div id="game-wrapper">
        <div id="board-container"></div>
        <canvas id="game-overlay"></canvas>
    </div>
    <button class="btn-back-menu">Back to Menu</button>
</div>

<div id="level-complete" class="screen" style="display:none">
    <h2>Level Complete!</h2>
    <button id="btn-next-level">Next Level</button>
    <button class="btn-back-menu">Back to Menu</button>
</div>

<div id="level-failed" class="screen" style="display:none">
    <h2>Level Failed</h2>
    <button id="btn-retry">Retry</button>
    <button class="btn-back-menu">Back to Menu</button>
</div>

<div id="win-message"></div>
<div id="milestone-message"></div>

<footer id="charity-footer">
    Inspired by <a href="https://www.charitywater.org/" target="_blank" rel="noopener">charity: water</a> | 
    <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener">Donate</a>
</footer>

<script src="script.js"></script>
<!-- CoPilot can now edit script.js or suggest fixes inline -->
</body>
</html>
